name: Gym Monitor - Auto Update & Deploy

on:
  schedule:
    - cron: '*/30 * * * *' # Run every 30 minutes
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions needed for GitHub Pages and writing to repo
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and Record Gym Data
        run: |
          # 1. Fetch raw data
          RAW_DATA=$(curl -s https://www.daansports.com.tw/zh_TW/onsitenum)
          
          # 2. Parse numbers
          CURRENT=$(echo "$RAW_DATA" | grep -oP '健身房\s*\K\d+')
          MAX=$(echo "$RAW_DATA" | grep -oP '健身房\s*\d+\s*人\/\s*容留\s*\K\d+')
          
          if [ -z "$CURRENT" ] || [ -z "$MAX" ]; then
            echo "::warning title=Parser Error::Could not extract gym numbers"
            exit 0 # Don't fail the whole build if site is down
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          DATE_LABEL=$(date -u +"%m/%d %H:%M")

          # 3. Update current data.json
          echo "{\"gym\": {\"current\": $CURRENT, \"max\": $MAX}, \"timestamp\": \"$TIMESTAMP\"}" > public/data.json

          # 4. Append to history.json (using jq)
          # Initialize history.json if empty/missing
          if [ ! -f public/history.json ]; then echo "[]" > public/history.json; fi
          
          # Add new record and trim to last 336 records (7 days * 48 half-hour slots)
          TEMP_HISTORY=$(jq --arg cur "$CURRENT" --arg time "$TIMESTAMP" --arg lbl "$DATE_LABEL" \
            '. + [{current: ($cur|tonumber), timestamp: $time, label: $lbl}] | tail(336)' public/history.json)
          echo "$TEMP_HISTORY" > public/history.json

      - name: Commit Data Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data.json public/history.json
          git commit -m "chore: auto-update gym logs [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
